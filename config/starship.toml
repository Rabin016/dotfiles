# ~/.config/starship.toml

# Inserts a blank line between shell prompts
add_newline = false

# A continuation prompt that displays when pressing enter in the middle of a command
continuation_prompt = "▶▶ "

# Wait 10 milliseconds for starship to check for keyboard input
scan_timeout = 10

# Replace the "❯" symbol in the prompt with "➜"
[character] # The name of the module we are configuring is "character"
success_symbol = "[➜](bold green)" # The success_symbol is being set to "➜" with the color green
error_symbol = "[✗](bold red)" # The error_symbol is being set to "✗" with the color red

[username]
show_always = true
format = "[$user]($style)@"
style_user = "bold green" # Purple

[hostname]
# format = "[$hostname]($style) "
style = "bold #ff78c6" # Pink
disabled = false
ssh_only = false
trim_at = "-"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #FFFF00"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " "
read_only_style = "bold red"
repo_root_style = "bold #bd92f9"
repo_root_format = "[$before_root_path]($before_repo_root_style)repo:[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
# truncation_symbol = "repo: "
use_os_path_sep = true

# Configures the git_branch module
[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold yellow"

# Configures the git_status module
[git_status]
format = "([$all_status$ahead_behind]($style)) "
style = "bold red"
stashed = " "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
conflicted = "=${count}"
modified = "!${count}"
renamed = "»${count}"
deleted = "✘${count}"


[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "bold yellow"

[nodejs]
format = "has [ $version](bold green) "

# Disable the package module, hiding it from the prompt
[package]
disabled = true
