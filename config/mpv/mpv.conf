
# =====================================================================
# OSD SETTINGS (Keep your custom layout)
# =====================================================================
save-position-on-quit=yes
title-bar=no
osd-font-size=22

--osd-level=3

# =====================================================================
# PERFORMANCE FIXES FOR INTEL i7-6600U
# =====================================================================
# 1. Force hardware acceleration via VA-API
hwdec=vaapi

# 2. Downgrade from 'gpu-hq' to standard 'gpu' to relieve your integrated GPU
vo=gpu
profile=fast

# 3. Use an aggressive frame-drop rule so audio and video stay perfectly synced
framedrop=vo

# 4. Strip out heavy scaling algorithms that cause lag on Intel HD 520
scale=bilinear
cscale=bilinear
dscale=bilinear

# 5. Disable heavy interpolation/resampling which triggers playback stutter
video-sync=audio
interpolation=no

# =====================================================================
# AUDIO & GENERAL
# =====================================================================
volume-max=150




